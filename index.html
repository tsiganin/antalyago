<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Antalya Go</title>
    <script src="https://cdn.jsdelivr.net/npm/wgo@2.3.1/wgo.min.js"></script>
    <style>
        body { background: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #goban { width: 450px; height: 450px; background: #f3c27b; border: 5px solid #4a3000; cursor: crosshair; }
        #msg { font-family: sans-serif; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="msg">Tahta Hazır (Tıklayarak Taş Koy)</div>
    <div id="goban"></div>

    <script>
        // Sayfa yüklendiğinde çalış
        window.onload = function() {
            if (typeof WGo !== "undefined") {
                var board = new WGo.Board(document.getElementById("goban"), { width: 450, size: 19 });
                var color = WGo.B;
                board.addEventListener("click", function(x, y) {
                    board.addObject({x: x, y: y, c: color});
                    color = -color;
                    document.getElementById("msg").innerText = "Sıra: " + (color == WGo.B ? "Siyah" : "Beyaz");
                });
            } else {
                document.getElementById("msg").innerText = "Hata: Kütüphane yüklenemedi!";
            }
        };
    </script>
</body>
</html>
